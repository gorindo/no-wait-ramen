<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Wait Ramen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="index-page">

{% set ramen_url = url_for('static', filename='ramen.jpg') %}
<div class="hero" style="background-image: url('{{ ramen_url }}')">
    <div class="hero-overlay">
        <p class="hero-eyebrow">🍜 No Wait Ramen</p>
        <h1 class="hero-title">今すぐ入れる<br>ラーメン</h1>
        <p class="hero-area">📍 {{ area_name }}エリア ▼</p>
        <p class="hero-copy">今すぐ、空席に滑り込め。</p>
        <p class="hero-sub">待ち時間ほぼゼロの店だけ表示</p>

        <div class="filter-buttons">
            <a href="/result?mode=nearby" class="hero-button hero-button--location">
                📍 今すぐ入れる店を見る
            </a>
            <div class="filter-buttons-sub">
                <a href="/result?max_walk=5" class="hero-button hero-button--secondary hero-button--half">徒歩5分以内</a>
                <a href="/result?max_walk=10" class="hero-button hero-button--secondary hero-button--half">徒歩10分以内</a>
            </div>
            <a href="/result" class="hero-button hero-button--ghost">すべて見る</a>
        </div>

        <p class="hero-note">営業中の店舗のみ表示します</p>
    </div>
</div>

</body>
</html>
